    <section class="page-hero reveal"><span class="page-number">01 / ABOUT</span><div><h1 data-zh-html="个人<em>简介</em>" data-en-html="About <em>Me</em>">个人<em>简介</em></h1><p class="page-lead" data-zh="我是肖友凯，南京大学商学院市场营销博士生。我的学术训练横跨市场营销与计算机科学，这让我既关注消费者行为背后的心理机制，也重视如何使用数据与计算方法回答营销问题。" data-en="I am Youkai (Kyle) Xiao, a PhD candidate in Marketing at Nanjing University Business School. My training spans marketing and computer science, shaping my interest in both the psychological mechanisms behind consumer behavior and the use of data and computational methods in marketing research.">我是肖友凯，南京大学商学院市场营销博士生。我的学术训练横跨市场营销与计算机科学，这让我既关注消费者行为背后的心理机制，也重视如何使用数据与计算方法回答营销问题。</p></div></section>
